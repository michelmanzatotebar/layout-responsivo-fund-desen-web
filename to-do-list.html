<!doctype html>
<html class="no-js" lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do List</title>
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>
  <div class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar bg-dark navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">Navbar</a>
          <button class="navbar-toggler d-flex ms-auto" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </nav>
      <div class="collapse" id="navbarSupportedContent" data-bs-theme="dark">
        <div class="bg-dark p-4">
          <div class="d-flex flex-column flex-lg-row gap-2">
            <a class="btn btn-outline-light" href="index.html" role="button">Tela inicial</a>
            <a class="btn btn-outline-light" href="contador.html" role="button">Contador</a>
            <a class="btn btn-outline-light" href="seletor_de_cor.html" role="button">Seletor de cor</a>
            <a class="btn btn-outline-light" href="to-do-list.html" role="button">To-Do List</a>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow-1 bg-white">
      <section class="bg-light text-center py-5">
        <div class="container py-5">
          <h1 class="display-5 fw-bold mb-2">To-Do List</h1>
          <p class="fs-4 mb-0">Adicione ou remova itens em sua lista de tarefas.</p>
        </div>
      </section>

      <section class="container py-4">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="text-center mb-2">
              <button type="button" class="btn btn-success">
                <i class="bi bi-plus-circle-fill"></i>
                Adicionar
              </button>
            </div>

            <div class="d-flex align-items-center gap-2 mb-2">
              <input type="text" class="form-control" placeholder="Digite aqui a tarefa...">
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" role="switch" aria-label="Concluir tarefa 1">
              </div>
              <button type="button" class="btn btn-danger" aria-label="Remover tarefa 1">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>

            <div class="d-flex align-items-center gap-2">
              <input type="text" class="form-control" placeholder="Digite aqui a tarefa...">
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" role="switch" aria-label="Concluir tarefa 2">
              </div>
              <button type="button" class="btn btn-danger" aria-label="Remover tarefa 2">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="text-center p-3 bg-light fst-italic text-secondary">
      Copyright &copy; 2026 Michel Manzato Tebar UTFPR
    </footer>
  </div>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
