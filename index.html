<body>
  <div class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar bg-dark navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Navbar</a>
          <button class="navbar-toggler d-flex" type="button" data-bs-toggle="collapse"

    <main class="d-flex flex-column flex-grow-1 justify-content-center align-items-center bg-light">

        <h1 class="fw-bold mb-1">Contador</h1>
        <h4 class="text-muted">Utilize os botões abaixo para registrar uma contagem.</h4>

        <div class="d-flex flex-column flex-md-row-reverse gap-2 justify-content-center mt-4">
          <button class="btn btn-success d-flex align-items-center justify-content-center gap-2">

            <span>1</span>
          </button>
          <button class="btn btn-danger d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-dash-circle"></i>
            <span>1</span>
          </button>
        </div>
        <h1 class="fs-1 fw-bold mt-3">0</h1>
      </div>
